spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reserbayan_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Default to mysql dialect locally if SPRING_DATASOURCE_URL contains mysql, but Spring Boot 
# usually auto-detects the dialect. Let's rely on auto-detection or set it explicitly based on env.
# For simplicity, we just set the URL and let Spring detect the dialect, but since Supabase is Postgres,
# we force driver to postgresql. Note: If local development still uses MySQL, this might cause issues locally.
# The user wants to deploy with Supabase DB (Postgres). So we will assume Postgres is the main DB now.

server.port=${PORT:8080}
